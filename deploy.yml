- hosts: all
  become: yes
  tasks:
    - name: Ensure Docker is installed
      apt: name=docker.io state=present update_cache=yes
    - name: Pull latest image
      docker_container:
        name: petclinic
        image: yanasheva/petclinic:latest
        state: started
        restart: yes
        ports:
          - "8082:8082"
